<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo-area">
        <img src="assets/chair-and-book-logo.png" alt="App Logo" />
      </div>
      <div>
        <h2>Login</h2>

        <form id="loginForm">
          <input type="text" id="username" placeholder="Username" required />
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />

          <button type="submit">Login</button>
        </form>
      </div>
      <div class="register-container">
        <p>New user?</p>
        <p class="register-link"><a href="register.html">Register</a></p>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
